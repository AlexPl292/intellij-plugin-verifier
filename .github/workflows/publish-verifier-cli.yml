name: Release verifier-cli

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & release
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle Dependencies Cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', 'gradle.properties') }}

      - name: Setup Gradle Wrapper Cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

      # The verifier-cli build transitively needs `structure-intellij`, so the dev version of that
      # library has to be in the local Maven cache before building the shadow JAR.
      - name: Publish structure-intellij to Maven Local
        run: |
          cd plugins-verifier-service
          ./gradlew :intellij-plugin-structure:publishToMavenLocal

      - name: Build shadow JAR
        run: |
          cd intellij-plugin-verifier
          ./gradlew :verifier-cli:shadowJar \
            -PverifierProjectVersion=1.403-ideavim-${{ github.run_number }} \
            -PintellijStructureVersion=dev

      - name: Create GitHub Release with asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="cli-${{ github.run_number }}"
          gh release create "$tag" \
            --title "verifier-cli 1.403-ideavim-${{ github.run_number }}" \
            --notes "Build of verifier-cli (with IdeaVIM dev-channel override) from commit ${{ github.sha }}." \
            intellij-plugin-verifier/verifier-cli/build/libs/verifier-cli-*-all.jar
